name: Railway Auto-Deploy

on:
  workflow_dispatch:  # 允许手动触发

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create Railway deployment script
        run: |
          cat > deploy_railway.sh << 'EOF'
          #!/bin/bash
          echo "=========================================="
          echo "FinScreener Railway 自动部署脚本"
          echo "=========================================="
          echo ""
          echo "由于Railway需要用户授权，无法完全自动化部署。"
          echo "但为您准备了以下解决方案："
          echo ""
          echo "方案A：使用一键部署链接（推荐）"
          echo "请访问："
          echo "https://railway.app/new?template=python&env=TUSHARE_TOKEN%3D13d6c6df74675cbb76961df7cde5c08fc73ee57a61b80636fa745e96%26AI_PROVIDER%3Dmock%26ENVIRONMENT%3Dproduction%26CORS_ORIGINS%3Dhttps%3A%2F%2Ffinscreener.vercel.app%2Chttp%3A%2F%2Flocalhost%3A3000%26LOG_LEVEL%3DINFO%26CACHE_TTL%3D300"
          echo ""
          echo "方案B：手动部署步骤"
          echo "1. 访问 https://railway.app"
          echo "2. 登录GitHub账号"
          echo "3. 点击 '+ New Project'"
          echo "4. 选择 'Deploy from GitHub repo'"
          echo "5. 选择 'aleilo199607-ctrl/finscreener'"
          echo "6. 等待部署完成"
          echo "7. 添加以下环境变量："
          echo "   TUSHARE_TOKEN=13d6c6df74675cbb76961df7cde5c08fc73ee57a61b80636fa745e96"
          echo "   AI_PROVIDER=mock"
          echo "   ENVIRONMENT=production"
          echo "   CORS_ORIGINS=https://finscreener.vercel.app,http://localhost:3000"
          echo "   LOG_LEVEL=INFO"
          echo "   CACHE_TTL=300"
          echo ""
          echo "部署完成后，请将Railway URL保存到："
          echo "  RAILWAY_URL.txt"
          echo "=========================================="
          EOF
          
          chmod +x deploy_railway.sh
          
          # 创建部署指南
          cat > DEPLOY_GUIDE.md << 'EOF'
          # Railway 部署指南
          
          ## 一键部署链接
          
          点击以下链接开始部署：
          
          [🚀 一键部署到Railway](https://railway.app/new?template=python&env=TUSHARE_TOKEN%3D13d6c6df74675cbb76961df7cde5c08fc73ee57a61b80636fa745e96%26AI_PROVIDER%3Dmock%26ENVIRONMENT%3Dproduction%26CORS_ORIGINS%3Dhttps%3A%2F%2Ffinscreener.vercel.app%2Chttp%3A%2F%2Flocalhost%3A3000%26LOG_LEVEL%3DINFO%26CACHE_TTL%3D300)
          
          ## 环境变量配置
          
          以下环境变量已预配置：
          
          - **TUSHARE_TOKEN**: `13d6c6df74675cbb76961df7cde5c08fc73ee57a61b80636fa745e96`
          - **AI_PROVIDER**: `mock`
          - **ENVIRONMENT**: `production`
          - **CORS_ORIGINS**: `https://finscreener.vercel.app,http://localhost:3000`
          - **LOG_LEVEL**: `INFO`
          - **CACHE_TTL**: `300`
          
          ## 部署步骤
          
          1. **点击上面的链接**
          2. **登录GitHub账号**（如果未登录）
          3. **授权Railway访问你的仓库**
          4. **选择仓库**: `aleilo199607-ctrl/finscreener`
          5. **等待部署完成**（约2-3分钟）
          6. **复制Railway URL**
          
          ## 验证部署
          
          部署完成后，访问：
          - `{YOUR_RAILWAY_URL}/docs` - API文档
          - `{YOUR_RAILWAY_URL}/health` - 健康检查
          
          ## 保存URL
          
          部署完成后，请将Railway URL保存到`RAILWAY_URL.txt`文件中。
          
          EOF
          
          echo "部署脚本创建完成！"

      - name: Upload deployment artifacts
        uses: actions/upload-artifact@v4
        with:
          name: railway-deployment-files
          path: |
            deploy_railway.sh
            DEPLOY_GUIDE.md
          retention-days: 30