# 阿里云函数计算 FC 3.0 部署配置
# 使用方法：
#   1. 安装 Serverless Devs: npm install -g @serverless-devs/s
#   2. 配置阿里云密钥: s config add
#   3. 部署: s deploy

edition: 3.0.0
name: finscreener-api
access: default

services:
  finscreener:
    component: fc3
    props:
      region: cn-hangzhou
      service:
        name: finscreener-service
        description: 'FinScreener 智能股票筛选API'
      function:
        name: finscreener-api
        description: 'FinScreener 后端API - 东方财富数据源'
        runtime: python3.10
        codeUri: ./backend/
        handler: app_fc.handler
        memorySize: 512
        timeout: 120
        caPort: 9000
        instanceConcurrency: 10
        customRuntimeConfig:
          command:
            - bash
            - bootstrap
        environmentVariables:
          CORS_ORIGINS: "https://finscreener-wcxd.vercel.app,https://finscreener.vercel.app,http://localhost:3000,http://localhost:5173"
      triggers:
        - name: http-trigger
          type: http
          config:
            authType: anonymous
            methods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
      customDomains:
        - domainName: auto
          protocol: HTTP,HTTPS
          routeConfigs:
            - path: /*
              functionName: finscreener-api
              serviceName: finscreener-service
